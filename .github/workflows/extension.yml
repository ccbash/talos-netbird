name: build-extension

on:
  push:
    branches: [main]
    # tags: ["v*"]
    # paths:
    #   - "extension/**"
    #   - ".github/workflows/extension.yml"
  pull_request:
    paths:
      - "extension/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./extensions
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/talos-netbird:latest
            ghcr.io/${{ github.repository_owner }}/talos-netbird:${{ github.ref_name }}